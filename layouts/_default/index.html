<body>
    <h1>Zoek in PDF publicaties</h1>

    <div style="margin-bottom: 20px;">
        <label for="year-select"><strong>Kies een jaar:</strong></label>
        <select id="year-select" style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
            <option value="">-- Selecteer een jaar --</option>
            {{ $docs := readDir "docs" }}
            {{ range $docs }}
                {{ if .IsDir }}
                    <option value="{{ .Name }}">{{ .Name }}</option>
                {{ end }}
            {{ end }}
        </select>
    </div>
    
    <div id="search"></div>

    <script src="{{ "_pagefind/pagefind-ui.js" | absURL }}"></script>
    
    <script>
        let currentSearch = null;

        document.getElementById('year-select').addEventListener('change', function() {
            const year = this.value;
            const searchDiv = document.getElementById('search');
            
            // Maak het zoekveld leeg bij een nieuwe keuze
            searchDiv.innerHTML = "";

            if (year) {
                // Initialiseer Pagefind voor het specifieke jaar
                currentSearch = new PagefindUI({ 
                    element: "#search", 
                    // Dit is de cruciale instelling:
                    bundlePath: "/_pagefind_" + year + "/",
                    showSubResults: false,
                    showImages: false,
                    excerptLength: 15,
                    showFilters: ["categorie", "zaak"],
                    translations: {
                        placeholder: "Zoek in documenten uit " + year + "...",
                        clear_search: "Wissen",
                        load_more: "Meer resultaten laden",
                        zero_results: "Geen resultaten gevonden in " + year,
                        many_results: "[COUNT] resultaten gevonden",
                        one_result: "[COUNT] resultaat gevonden",
                        searching: "Zoeken in " + year + "..."
                    }
                });
            }
        });
    </script>
</body>
