<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>S3 PDF Zoeker - Coevorden</title>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            max-width: 100%; 
            margin: 20px auto; 
            padding: 0 20px; 
            background-color: transparent;
            color: #333;
        }

        h1 { color: #111; font-size: 1.6rem; }

        .selector-container {
            margin: 20px 0;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: 100%;
            max-width: 300px;
            cursor: pointer;
        }

        #search { margin-top: 20px; }

        :root {
            --pagefind-ui-primary: #0056b3;
            --pagefind-ui-text: #333;
            --pagefind-ui-background: #ffffff;
            --pagefind-ui-border: #ddd;
        }

        .placeholder-text {
            color: #666;
            font-style: italic;
            padding: 40px 0;
            text-align: center;
            border: 2px dashed #eee;
        }
    </style>
     <link href="{{ "_pagefind_2026/pagefind-ui.css" | absURL }}" rel="stylesheet">
</head>

<body>
    <h1>Zoek in PDF publicaties</h1>

    <div class="selector-container">
        <label for="year-select"><strong>Stap 1: Kies een publicatiejaar</strong></label><br><br>

        <select id="year-select">
            <option value="">-- Selecteer een jaar --</option>
            {{ $docs := readDir "docs" }}
            {{ range $docs }}
                {{ if .IsDir }}
                    <option value="{{ .Name }}">{{ .Name }}</option>
                {{ end }}
            {{ end }}
        </select>
    </div>

    <div id="search">
        <div class="placeholder-text">
            Kies hierboven eerst een jaar om de zoekfunctie te activeren.
        </div>
    </div>

   <script>
    const BASE_PATH = "/publicaties-Coevorden-test";

    function loadPagefind(year) {
        const searchContainer = document.getElementById('search');
        searchContainer.innerHTML = "";

        if (!year) {
            searchContainer.innerHTML = `
                <div class="placeholder-text">
                    Kies hierboven eerst een jaar om de zoekfunctie te activeren.
                </div>`;
            return;
        }

        const oldScript = document.getElementById("pagefind-script");
        if (oldScript) oldScript.remove();

        const script = document.createElement("script");
        script.id = "pagefind-script";

        // ✔ FIX: base path toegevoegd
        script.src = BASE_PATH + "/_pagefind_" + year + "/pagefind-ui.js";

        script.onload = () => {
            new PagefindUI({
                element: "#search",

                // ✔ FIX: ook bundlePath moet basePath krijgen
                bundlePath: BASE_PATH + "/_pagefind_" + year + "/",

                showSubResults: false,
                showImages: false,
                excerptLength: 15,

                showFilters: ["categorie", "zaak"],

                translations: {
                    placeholder: "Zoek in documenten uit " + year + "...",
                    clear_search: "Wissen",
                    load_more: "Meer resultaten laden",
                    search_label: "Zoek in jaar " + year,
                    filters_label: "Filters",
                    zero_results: "Geen resultaten gevonden in " + year,
                    searching: "Zoeken..."
                }
            });
        };

        document.body.appendChild(script);
    }

    document.getElementById('year-select').addEventListener('change', function () {
        loadPagefind(this.value);
    });
</script>
</body>
</html>
