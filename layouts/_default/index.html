<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>S3 PDF Zoeker - Coevorden</title>
    <link href="{{ "_pagefind/pagefind-ui.css" | absURL }}" rel="stylesheet">

<style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        max-width: 800px; 
        margin: 20px auto; 
        padding: 0 20px; 
        background-color: transparent; /* Neemt kleur van de host-site over */
        color: #333;
    }
    h1 { color: #111; font-size: 1.6rem; }
    #search { margin-top: 20px; }

    /* Pagefind UI specifieke aanpassingen voor iframe */
    :root {
        --pagefind-ui-primary: #0056b3;
        --pagefind-ui-text: #333;
        --pagefind-ui-background: #ffffff;
        --pagefind-ui-border: #ddd;
    }
</style>
    
</head>
<body>
    <h1>Zoek in PDF publicaties</h1>
    
    <div id="search"></div>

    <script src="{{ "_pagefind/pagefind-ui.js" | absURL }}"></script>
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            new PagefindUI({ 
                element: "#search", 
                showSubResults: false,
                showImages: false,
                excerptLength: 15,
                showFilters: ["categorie", "zaak"],
                translations: {
                    placeholder: "Zoek hier naar documenten...",
                    clear_search: "Wissen",
                    load_more: "Meer resultaten laden",
                    search_label: "Zoek in deze site",
                    filters_label: "Filters",
                    zero_results: "Geen resultaten gevonden voor [SEARCH_TERM]",
                    many_results: "[COUNT] resultaten gevonden voor [SEARCH_TERM]",
                    one_result: "[COUNT] resultaat gevonden voor [SEARCH_TERM]",
                    searching: "Zoeken naar [SEARCH_TERM]..."
                }
            });
        });
    </script>
</body>
</html>
