<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>S3 PDF Zoeker - Coevorden</title>
    <link href="{{ "_pagefind/pagefind-ui.css" | absURL }}" rel="stylesheet">

<style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        max-width: 800px; 
        margin: 20px auto; 
        padding: 0 20px; 
        background-color: transparent;
        color: #333;
    }
    h1 { color: #111; font-size: 1.6rem; }
    
    .selector-container {
        margin: 20px 0;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 8px;
        border: 1px solid #eee;
    }

    select {
        padding: 10px;
        font-size: 1rem;
        border-radius: 4px;
        border: 1px solid #ccc;
        width: 100%;
        max-width: 300px;
        cursor: pointer;
    }

    #search { margin-top: 20px; }

    /* Pagefind UI aanpassingen */
    :root {
        --pagefind-ui-primary: #0056b3;
        --pagefind-ui-text: #333;
        --pagefind-ui-background: #ffffff;
        --pagefind-ui-border: #ddd;
    }

    .placeholder-text {
        color: #666;
        font-style: italic;
        padding: 40px 0;
        text-align: center;
        border: 2px dashed #eee;
    }
</style>
    
</head>
<body>
    <h1>Zoek in PDF publicaties</h1>
    
    <div class="selector-container">
        <label for="year-select"><strong>Stap 1: Kies een publicatiejaar</strong></label><br><br>
        <select id="year-select">
            <option value="">-- Selecteer een jaar --</option>
            {{/* Haal de mappen op uit de docs folder */}}
            {{ $docs := readDir "docs" }}
            {{ range $docs }}
                {{ if .IsDir }}
                    <option value="{{ .Name }}">{{ .Name }}</option>
                {{ end }}
            {{ end }}
        </select>
    </div>

    <div id="search">
        <div class="placeholder-text">Kies hierboven eerst een jaar om de zoekfunctie te activeren.</div>
    </div>

    <script src="{{ "_pagefind/pagefind-ui.js" | absURL }}"></script>
    
    <script>
        document.getElementById('year-select').addEventListener('change', function() {
            const year = this.value;
            const searchContainer = document.getElementById('search');
            
            // Maak de container leeg
            searchContainer.innerHTML = "";

            if (year) {
                // Initialiseer de UI voor het specifieke jaar-shard
                new PagefindUI({ 
                    element: "#search", 
                    // Dit verwijst naar de specifieke index per jaar die door de workflow wordt gebouwd
                    bundlePath: "/_pagefind_" + year + "/",
                    showSubResults: false,
                    showImages: false,
                    excerptLength: 15,
                    showFilters: ["categorie", "zaak"],
                    translations: {
                        placeholder: "Zoek in documenten uit " + year + "...",
                        clear_search: "Wissen",
                        load_more: "Meer resultaten laden",
                        search_label: "Zoek in jaar " + year,
                        filters_label: "Filters",
                        zero_results: "Geen resultaten gevonden in " + year + " voor [SEARCH_TERM]",
                        many_results: "[COUNT] resultaten gevonden",
                        one_result: "[COUNT] resultaat gevonden",
                        searching: "Zoeken in " + year + "..."
                    }
                });
            } else {
                searchContainer.innerHTML = '<div class="placeholder-text">Kies hierboven eerst een jaar om de zoekfunctie te activeren.</div>';
            }
        });

        // Optioneel: check of er een jaar in de URL staat (bijv. ?jaar=2024)
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const jaar = params.get('jaar');
            if (jaar) {
                const sel = document.getElementById('year-select');
                sel.value = jaar;
                sel.dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
