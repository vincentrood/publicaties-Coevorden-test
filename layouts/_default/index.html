<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>S3 PDF Zoeker - Coevorden</title>
    <link href="_pagefind/pagefind-ui.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .selector-container { margin: 20px 0; padding: 15px; background: #f4f4f4; border-radius: 5px; }
        select { padding: 8px; width: 100%; max-width: 300px; }
        #search { margin-top: 20px; min-height: 200px; }
        .instruction { color: #666; font-style: italic; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>Zoek in PDF publicaties</h1>
    
    <div class="selector-container">
        <label for="year-select"><strong>Kies een jaar:</strong></label><br><br>
        <select id="year-select">
            <option value="">-- Maak een keuze --</option>
            {{ $docs := readDir "docs" }}
            {{ range $docs }}{{ if .IsDir }}
            <option value="{{ .Name }}">{{ .Name }}</option>
            {{ end }}{{ end }}
        </select>
    </div>

    <div id="search">
        <p class="instruction">Selecteer eerst een jaar om de documenten te doorzoeken.</p>
    </div>

    <script src="_pagefind/pagefind-ui.js"></script>
    
    <script>
        // Bepaal de base path voor GitHub Pages dynamisch
        // Dit zorgt ervoor dat het werkt op 'vincentrood.github.io/publicaties-Coevorden-test/'
        const repoPath = window.location.pathname.replace('index.html', '').replace(/\/$/, '');

        document.getElementById('year-select').addEventListener('change', function() {
            const year = this.value;
            const searchDiv = document.getElementById('search');
            
            searchDiv.innerHTML = ""; // Reset de zoekbox

            if (year) {
                // De bundlePath moet relatief zijn aan de root van je domein OF exact kloppen
                // We gebruiken hier het volledige pad inclusief de repo-naam
                const fullBundlePath = repoPath + "/_pagefind_" + year + "/";
                
                console.log("Laden index voor jaar:", year, "op pad:", fullBundlePath);

                new PagefindUI({ 
                    element: "#search", 
                    bundlePath: fullBundlePath, // CRUCIAAL: wijst naar de specifieke jaar-map
                    showSubResults: false,
                    excerptLength: 20,
                    translations: {
                        placeholder: "Zoek in documenten uit " + year,
                        searching: "Zoeken in archief " + year + "..."
                    }
                });
            } else {
                searchDiv.innerHTML = '<p class="instruction">Selecteer eerst een jaar om de documenten te doorzoeken.</p>';
            }
        });
    </script>
</body>
</html>
