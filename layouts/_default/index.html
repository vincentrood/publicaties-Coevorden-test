<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>S3 PDF Zoeker - Coevorden</title>
    <link href="https://vincentrood.github.io/publicaties-Coevorden/_pagefind/pagefind-ui.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        #search { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Zoek in PDF publicaties</h1>
    
    <div id="search"></div>

    <script src="https://vincentrood.github.io/publicaties-Coevorden/_pagefind/pagefind-ui.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', (event) => {
            new PagefindUI({ 
                element: "#search", 
                showSubResults: true,
                showImages: false,
                excerptLength: 40,
                showFilters: ["categorie", "zaak"],
                translations: {
                    placeholder: "Zoek hier naar documenten...",
                    clear_search: "Wissen",
                    load_more: "Meer resultaten laden",
                    search_label: "Zoek in deze site",
                    filters_label: "Filters",
                    zero_results: "Geen resultaten gevonden voor [SEARCH_TERM]",
                    many_results: "[COUNT] resultaten gevonden voor [SEARCH_TERM]",
                    one_result: "[COUNT] resultaat gevonden voor [SEARCH_TERM]",
                    searching: "Zoeken naar [SEARCH_TERM]..."
                }
            });
        });
    </script>
</body>
</html>
