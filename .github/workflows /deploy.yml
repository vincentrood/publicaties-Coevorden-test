name: Sync S3 and Build Search
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Elke nacht synchroniseren mochten er nieuwe PDF's zijn

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2

      - name: Sync Markdown from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p content/docs
          aws s3 sync s3://publicaties-coevorden content/docs/ --exclude "*" --include "*.md" --region eu-central-1

      - name: Build Hugo
        run: hugo --minify

      - name: Index with Pagefind
        run: npx pagefind --site public --bundle-dir _pagefind

      - name: Deploy to GitHub Pages (of S3)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          
          
          
