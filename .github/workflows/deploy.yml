name: Robust S3 to Markdown Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils jq

      - name: Sync Logic (Robust & Scalable)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
          BUCKET_NAME: publicaties-coevorden
        run: |
          set -e
          mkdir -p docs

          echo "📥 S3 lijst ophalen (met pagination)..."

          > s3_list.txt
          TOKEN=""

          while : ; do
            if [ -z "$TOKEN" ]; then
              RESPONSE=$(aws s3api list-objects-v2 \
                --bucket "$BUCKET_NAME" \
                --max-items 1000)
            else
              RESPONSE=$(aws s3api list-objects-v2 \
                --bucket "$BUCKET_NAME" \
                --starting-token "$TOKEN" \
                --max-items 1000)
            fi

            echo "$RESPONSE" | jq -r '.Contents[].Key' | grep '\.pdf$' >> s3_list.txt

            TOKEN=$(echo "$RESPONSE" | jq -r '.NextToken // empty')

            [ -z "$TOKEN" ] && break
          done

          sort -u s3_list.txt -o s3_list.txt

          echo "📊 Aantal PDF’s op S3:"
          wc -l s3_list.txt

          echo "📊 Aantal lokale MD bestanden:"
          find docs -name "*.md" | wc -l

          # Snelle lookup maken (veel sneller dan grep 10k keer)
          declare -A S3_MAP
          while IFS= read -r key; do
            S3_MAP["$key"]=1
          done < s3_list.txt

          echo "🧹 Verwijderen van oude bestanden..."
          find docs -name "*.md" -print0 | while IFS= read -r -d '' md_path; do
            relative_path="${md_path#docs/}"
            pdf_key_expected="${relative_path%.md}.pdf"

            if [[ -z "${S3_MAP[$pdf_key_expected]}" ]]; then
              echo "❌ Verwijderen: $md_path"
              rm "$md_path"
            fi
          done

          echo "➕ Nieuwe bestanden verwerken..."

          process_file () {
            pdf_key="$1"
            md_path="docs/${pdf_key%.pdf}.md"

            if [ ! -f "$md_path" ]; then
              echo "🆕 $pdf_key"

              mkdir -p "$(dirname "$md_path")"

              tmpfile=$(mktemp --suffix=.pdf)

              aws s3 cp "s3://$BUCKET_NAME/$pdf_key" "$tmpfile"
              pdftotext "$tmpfile" "$md_path"

              rm "$tmpfile"
            fi
          }

          export -f process_file
          export BUCKET_NAME

          # Parallel verwerking (4 tegelijk, veilig voor CI)
          cat s3_list.txt | xargs -I {} -P 4 bash -c 'process_file "$@"' _ {}

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync: S3 → Markdown (robust)"
          file_pattern: 'docs/**'

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2

      - name: Build Hugo
        run: |
          mkdir -p content/docs
          cp -r docs/* content/docs/ 2>/dev/null || true
          hugo --minify

      - name: Index with Pagefind
        run: npx pagefind --site public --bundle-dir _pagefind

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
