name: Robust S3 to Markdown Sync
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Voeg deze regel toe (zonder verdere extra's)

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils jq

      - name: Sync Logic (Subfolder Aware)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
          BUCKET_NAME: publicaties-coevorden
        run: |
          mkdir -p docs
          
          # 1. Haal de lijst van PDF's op S3 op (inclusief submappen)
          aws s3api list-objects-v2 --bucket "$BUCKET_NAME" --query 'Contents[].Key' --output json | jq -r '.[] | select(endswith(".pdf"))' > s3_list.txt

          # 2. VERWIJDEREN: Loop door lokale .md bestanden (ook in submappen)
          find docs -name "*.md" -print0 | while IFS= read -r -d '' md_path; do
            # Maak van 'docs/Map/bestand.md' -> 'Map/bestand.pdf'
            relative_path="${md_path#docs/}"
            pdf_key_expected="${relative_path%.md}.pdf"

            if ! grep -Fxq "$pdf_key_expected" s3_list.txt; then
              echo "S3 sync: Verwijderen (niet meer op S3) -> $md_path"
              rm "$md_path"
            fi
          done

          # 3. TOEVOEGEN: Loop door de S3 lijst
          while IFS= read -r pdf_key; do
            md_path="docs/${pdf_key%.pdf}.md"

            if [ ! -f "$md_path" ]; then
              echo "S3 sync: Nieuwe PDF ontdekt -> $pdf_key"
              mkdir -p "$(dirname "$md_path")"
              
              aws s3 cp "s3://$BUCKET_NAME/$pdf_key" "temp_file.pdf"
              pdftotext "temp_file.pdf" "$md_path"
              rm "temp_file.pdf"
            else
              # Dit is wat je wilt zien voor 10.000 bestanden:
              echo "S3 sync: Reeds aanwezig -> $pdf_key"
            fi
          done < s3_list.txt

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync: S3 PDF naar Markdown (Safe Filenames)"
          file_pattern: 'docs/**'

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2

      - name: Build Hugo
        run: |
          mkdir -p content/docs
          # Gebruik 'cp -r' om ook submappen mee te nemen als die er zijn
          cp -r docs/* content/docs/ 2>/dev/null || true
          hugo --minify

      - name: Index with Pagefind
        run: npx pagefind --site public --bundle-dir _pagefind

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
