name: Scalable S3 to Markdown Sync
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Sync and Convert
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
          BUCKET_NAME: publicaties-coevorden
        run: |
          mkdir -p docs
          mkdir -p temp_pdfs

          # 1. Slimme Sync: Download alleen wat nieuw of gewijzigd is
          # De --delete vlag zorgt dat lokale PDFs verwijderd worden als ze op S3 weg zijn
          aws s3 sync "s3://$BUCKET_NAME/" temp_pdfs/ --delete --exclude "*" --include "*.pdf"

          # 2. Verwijder lokale Markdown bestanden die geen bijbehorende PDF meer hebben
          echo "Opschonen van oude Markdown bestanden..."
          find docs -name "*.md" | while read -r md_file; do
            relative_path="${md_file#docs/}"
            pdf_file="temp_pdfs/${relative_path%.md}.pdf"
            if [ ! -f "$pdf_file" ]; then
              echo "Verwijderen: $md_file (PDF niet meer op S3)"
              rm "$md_file"
            fi
          done

          # 3. Parallelle Conversie: Gebruik alle CPU kernen (xargs -P)
          # We converteren alleen als de .md niet bestaat OF ouder is dan de .pdf
          echo "Starten van (re)conversie..."
          find temp_pdfs -name "*.pdf" -print0 | xargs -0 -n 1 -P $(nproc) -I {} sh -c '
            pdf_path="{}"
            relative_path="${pdf_path#temp_pdfs/}"
            md_path="docs/${relative_path%.pdf}.md"
            
            # Controleer of conversie nodig is (nieuw of gewijzigd)
            if [ ! -f "$md_path" ] || [ "$pdf_path" -nt "$md_path" ]; then
              echo "Verwerken: $relative_path"
              mkdir -p "$(dirname "$md_path")"
              pdftotext -layout "$pdf_path" "$md_path"
            fi
          '

          # 4. Cleanup: Verwijder de tijdelijke PDF map om repo-ruimte te besparen
          rm -rf temp_pdfs

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync: S3 PDF naar Markdown (Parallel Processing)"
          file_pattern: 'docs/**'

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v2

      - name: Build Hugo
        run: |
          mkdir -p content/docs
          cp -r docs/* content/docs/ 2>/dev/null || true
          hugo --minify

      - name: Index with Pagefind
        run: npx pagefind --site public --bundle-dir _pagefind

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
