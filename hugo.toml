baseURL = 'https://vincentrood.github.io/publicaties-Coevorden-test/'
locale = 'nl-nl'  # Vervangt languageCode
title = 'PDF Zoekmachine'
theme = []

[taxonomies]
  map = "maps"

[params]
  s3_url = "https://publicaties-coevorden.s3.eu-north-1.amazonaws.com/"

# Definieer de XML-standaard voor Hugo
[outputFormats.XML]
  mediaType = "application/xml"
  baseName = "index"
  isHTML = false

[outputs]
  home = ["HTML", "Sitemap"]
  taxonomy = ["HTML"]
  term = ["XML"]  # Gebruikt nu de hierboven gedefinieerde XML
